name: doctest

on: [push]

jobs:
  doctest:
    runs-on: ubuntu-latest
    env:
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install groq python-dotenv pytest coverage build twine

      - name: Run doctests with coverage
        run: |
          python -m coverage run -m pytest chat.py --doctest-modules
          python -m coverage report -m